<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidBreefy Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg-primary: #0F0F1A;
      --bg-secondary: #1A1A2E;
      --bg-card: #252542;
      --bg-input: #1E1E3A;
      --border: #2D2D4A;
      --text-primary: #F8F8FF;
      --text-secondary: #A0AEC0;
      --text-muted: #6B7280;
      --primary: #7C3AED;
      --primary-hover: #6D28D9;
      --success: #10B981;
      --error: #EF4444;
      --radius: 8px;
      --radius-lg: 12px;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 400px;
      padding: 20px;
    }
    
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .section h2 {
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    
    .input {
      width: 100%;
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    
    .input:focus {
      border-color: var(--primary);
    }
    
    select {
      width: 100%;
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .checkbox-group input {
      width: 16px;
      height: 16px;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    
    .btn-danger {
      background: var(--error);
      color: white;
    }
    
    .btn-danger:hover {
      background: #DC2626;
    }
    
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--bg-input);
    }
    
    .btn-sm {
      padding: 8px;
      font-size: 12px;
    }
    
    .error {
      color: var(--error);
      font-size: 12px;
      margin-top: 4px;
    }
    
    .success {
      color: var(--success);
      font-size: 12px;
      margin-top: 4px;
    }
    
    .pro-badge {
      display: inline-block;
      background: var(--primary);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    
    .status-logged-in {
      color: var(--success);
    }
    
    .status-guest {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <h1>
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="8" fill="#7C3AED"/>
      <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2"/>
      <circle cx="16" cy="16" r="4" fill="white"/>
    </svg>
    VidBreefy Settings
  </h1>
  
  <div id="status-section"></div>
  
  <div id="login-section" class="section" style="display: none;">
    <h2>Sign In</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" class="input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="input" placeholder="Your password">
    </div>
    <div id="login-error" class="error"></div>
    <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
  </div>
  
  <div id="loggedin-section" class="section" style="display: none;">
    <h2>Account</h2>
    <div class="form-group">
      <label>Preferred Model <span class="pro-badge">PRO</span></label>
      <select id="model-select">
        <option value="groq">Groq (Free)</option>
        <option value="gpt4">GPT-4 (Pro)</option>
        <option value="claude">Claude (Pro)</option>
        <option value="gemini">Gemini (Pro)</option>
      </select>
    </div>
    <div class="form-group checkbox-group">
      <input type="checkbox" id="notifications" checked>
      <label for="notifications">Show desktop notifications</label>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="handleLogout()">Sign Out</button>
  </div>
  
  <script>
    const API_BASE = 'http://142.132.189.59:3001/api';
    
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
    });
    
    async function checkAuth() {
      const response = await chrome.runtime.sendMessage({ type: 'checkAuth' });
      const statusSection = document.getElementById('status-section');
      const loginSection = document.getElementById('login-section');
      const loggedinSection = document.getElementById('loggedin-section');
      
      if (response.isLoggedIn) {
        statusSection.innerHTML = `
          <div class="status status-logged-in">
            ✓ Logged in as ${response.user?.email || 'User'}
          </div>
        `;
        loginSection.style.display = 'none';
        loggedinSection.style.display = 'block';
        
        // Load saved settings
        const settings = await chrome.storage.local.get(['vidbreefy_model', 'vidbreefy_notifications']);
        if (settings.vidbreefy_model) {
          document.getElementById('model-select').value = settings.vidbreefy_model;
        }
        document.getElementById('notifications').checked = settings.vidbreefy_notifications !== false;
      } else {
        statusSection.innerHTML = `
          <div class="status status-guest">
            Not signed in
          </div>
        `;
        loginSection.style.display = 'block';
        loggedinSection.style.display = 'none';
      }
    }
    
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      
      errorEl.textContent = '';
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (!response.ok) {
          throw new Error('Invalid credentials');
        }
        
        const data = await response.json();
        
        await chrome.runtime.sendMessage({
          type: 'setAuth',
          token: data.token,
          user: data.user
        });
        
        await checkAuth();
      } catch (error) {
        errorEl.textContent = error.message || 'Login failed';
      }
    }
    
    async function handleLogout() {
      await chrome.runtime.sendMessage({ type: 'clearAuth' });
      await checkAuth();
    }
    
    // Save settings on change
    document.getElementById('model-select').addEventListener('change', async (e) => {
      await chrome.storage.local.set({ vidbreefy_model: e.target.value });
    });
    
    document.getElementById('notifications').addEventListener('change', async (e) => {
      await chrome.storage.local.set({ vidbreefy_notifications: e.target.checked });
    });
  </script>
</body>
</html>
